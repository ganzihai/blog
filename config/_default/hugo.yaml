# ===============================================================
# 根据如下的配置说明完善自己的站点配置，建议另外拷贝进行调整避免冲突
# ===============================================================

baseURL: /
title: 杆子博客
theme: hugo-ganzi
defaultContentLanguage: zh-cn
languageCode: zh-CN
hasCJKLanguage: true
pagination:
  pagerSize: 10
enableEmoji: true
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: false
    lineNumbersInTable: true
    noClasses: false
  tableOfContents:
    startLevel: 2
    endLevel: 4

module:
  mounts:
    - source: static
      target: static
    - source: random
      target: static/random

sitemap:
  filename: "sitemap.xml"
  changefreq: "weekly"
  priority: 0.5

outputFormats:
  RSS:
    baseName: "rss"
  LocalIndexes:
    mediaType: application/xml
    baseName: searchindexes
    isPlainText: true
    notAlternative: true
  AlgoliaIndexes:
    mediaType: application/json
    baseName: algolia
    isPlainText: true
    notAlternative: true
  # 搜索索引：生成 /search.json 供 Fuse.js 使用
  SearchIndex:
    mediaType: application/json
    baseName: search
    isPlainText: true
    notAlternative: true

outputs:
  home: ["HTML", "RSS", "SearchIndex"]

enableRobotsTXT: true

minify:
  minifyOutput: true
