{{ define "main" }}
<div class="crumb">当前位置： <a title="返回首页" href="{{ .Site.BaseURL }}">首页</a> &gt; {{ .Title }}</div>

<div class="article flinks-container">
    <h1 class="article-title" style="text-align: center; margin: 40px 0 50px; font-size: 28px;">友情连接</h1>
    
    <div class="article-content">
        <!-- 1. 优先显示所有的友链分块 (数据驱动) -->
        {{ $data := index .Site.Data.flinks "zh-cn" }}
        {{ range $data }}
            <div class="link-group">
                <h2 class="link-group-title">{{ .FLinksTitle }}</h2>
                {{ if .FLinksDesc }}<p class="link-group-desc">{{ .FLinksDesc }}</p>{{ end }}
                
                <div class="link-grid">
                    {{ range .FLinksList }}
                    <a href="{{ .link }}" target="_blank" class="link-card">
                        <div class="link-card-inner">
                            <div class="link-avatar">
                                <img src="{{ .avatar | default "/images/avatar.jpg" }}" alt="{{ .name }}" onerror="this.src='/images/avatar.jpg'" />
                            </div>
                            <div class="link-info">
                                <span class="link-name">{{ .name }}</span>
                                <span class="link-desc" title="{{ .desc }}">{{ .desc }}</span>
                            </div>
                        </div>
                    </a>
                    {{ end }}
                </div>
            </div>
        {{ end }}

        <!-- 2. 中间的分隔线 -->
        <div class="divider-line"><span>我可是有底线的哟</span></div>

        <!-- 3. 最后显示 index.md 里的内容 (说明文字 + 代码块) -->
        <div class="instructions-wrap">
            {{ .Content }}
        </div>
    </div>
</div>

<style>
    .flinks-container { background: #fff; padding: 30px; border-radius: 4px; }
    .link-group { margin-bottom: 50px; }
    .link-group-title { font-size: 22px; color: #333; margin-bottom: 10px; font-weight: bold; border: none !important; }
    .link-group-desc { color: #888; font-size: 14px; margin-bottom: 25px; }
    
    .link-grid { display: flex; flex-wrap: wrap; margin: 0 -10px; }
    .link-card { width: calc(33.333% - 20px); margin: 10px; text-decoration: none !important; }
    .link-card-inner { 
        background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; 
        display: flex; align-items: center; transition: all 0.3s cubic-bezier(.25,.8,.25,1);
    }
    .link-card:hover .link-card-inner { 
        transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        border-color: #ed5565; 
    }
    
    .link-avatar { width: 55px; height: 55px; flex-shrink: 0; margin-right: 15px; }
    .link-avatar img { width: 100%; height: 100%; border-radius: 5px; object-fit: cover; border: 1px solid #eee; }
    
    .link-info { display: flex; flex-direction: column; overflow: hidden; }
    .link-name { font-size: 16px; color: #333; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-desc { font-size: 12px; color: #777; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .divider-line { text-align: center; margin: 60px 0 40px; border-top: 1px dashed #ddd; position: relative; }
    .divider-line span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #fff; padding: 0 20px; color: #bbb; font-size: 13px; }

    /* 暗黑模式深度复刻 (对齐 11.png) */
    body.dark .flinks-container { background: #1a1a1a; }
    body.dark .link-group-title { color: #eee; }
    body.dark .link-card-inner { background: #222; border-color: #333; }
    body.dark .link-name { color: #fff; }
    body.dark .link-desc { color: #888; }
    body.dark .divider-line { border-color: #333; }
    body.dark .divider-line span { background: #1a1a1a; }
    body.dark .link-card:hover .link-card-inner { background: #282828; border-color: #ed5565; }

    @media (max-width: 992px) { .link-card { width: calc(50% - 20px); } }
    @media (max-width: 600px) { .link-card { width: calc(100% - 20px); } }
</style>
{{ end }}
