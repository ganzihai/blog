{{ define "main" }}
<div class="crumb">当前位置： <a title="返回首页" href="{{ .Site.BaseURL }}">首页</a> &gt; {{ .Title }}</div>

<div class="article flinks-container">
    <h1 class="article-title" style="text-align: center; margin: 20px 0 40px; font-size: 28px;">友情连接</h1>
    
    <div class="article-content">
        <!-- 友链卡片 -->
        {{ $data := index .Site.Data.flinks "zh-cn" }}
        {{ range $data }}
            <div class="link-group">
                <h2 class="link-group-title">{{ .FLinksTitle }}</h2>
                {{ if .FLinksDesc }}<p class="link-group-desc">{{ .FLinksDesc }}</p>{{ end }}
                
                <div class="link-grid">
                    {{ range .FLinksList }}
                    <a href="{{ .link }}" target="_blank" class="link-card">
                        <div class="link-card-inner">
                            <div class="link-avatar">
                                <img src="{{ .avatar | default "/images/avatar.jpg" }}" alt="{{ .name }}" onerror="this.src='/images/avatar.jpg'" />
                            </div>
                            <div class="link-info">
                                <span class="link-name">{{ .name }}</span>
                                <span class="link-desc" title="{{ .desc }}">{{ .desc }}</span>
                            </div>
                        </div>
                    </a>
                    {{ end }}
                </div>
            </div>
        {{ end }}

        <div class="divider-line"><span>我可是有底线的哟</span></div>

        <!-- 说明文字 -->
        <div class="instructions-wrap" style="padding: 10px 0;">
            {{ .Content }}
        </div>
    </div>
</div>

<style>
    .flinks-container { background: #fff; padding: 25px 30px 30px; border-radius: 4px; }
    .link-group { margin-bottom: 40px; }
    .link-group-title { font-size: 22px; color: #333; margin-bottom: 10px; font-weight: bold; border: none !important; }
    .link-group-desc { color: #888; font-size: 14px; margin-bottom: 25px; }
    
    .link-grid { display: flex; flex-wrap: wrap; margin: 0 -10px; }
    .link-card { width: calc(33.333% - 20px); margin: 10px; text-decoration: none !important; }
    .link-card-inner { 
        background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 15px; 
        display: flex; align-items: center; transition: all 0.3s;
    }
    .link-card:hover .link-card-inner { 
        transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
        border-color: #ed5565; 
    }
    
    .link-avatar { width: 50px; height: 50px; flex-shrink: 0; margin-right: 15px; }
    .link-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
    
    .link-info { display: flex; flex-direction: column; overflow: hidden; }
    .link-name { font-size: 16px; color: #333; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-desc { font-size: 12px; color: #888; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .divider-line { text-align: center; margin: 50px 0 30px; border-top: 1px dashed #ddd; position: relative; }
    .divider-line span { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #fff; padding: 0 20px; color: #bbb; font-size: 13px; }

    /* 强力暗黑模式适配 (针对 28.png) */
    body.dark .flinks-container { background: #1d1d1d !important; }
    body.dark .link-card-inner { background: #262626 !important; border-color: #333 !important; }
    body.dark .link-name { color: #eee !important; }
    body.dark .link-desc { color: #888 !important; }
    body.dark .link-group-title { color: #ddd !important; }
    body.dark .divider-line { border-color: #333 !important; }
    body.dark .divider-line span { background: #1d1d1d !important; }
    body.dark .link-card:hover .link-card-inner { border-color: #ed5565 !important; }

    @media (max-width: 992px) { .link-card { width: calc(50% - 20px); } }
    @media (max-width: 650px) { .link-card { width: calc(100% - 20px); } }
</style>
{{ end }}
