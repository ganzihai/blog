{{ define "main" }}
<div class="crumb">当前位置： <a title="返回首页" href="{{ .Site.BaseURL }}">首页</a> &gt; {{ .Title }}</div>

<div>
    <h class="flinks-page-title">友情连接</h>
</div>
<div class="article">
    
    <div class="article-content">
        {{ .Content }}
        <!-- 解析 NEXT 风格的 data/flinks/zh-cn.yaml 结构 -->
        {{ $flinks := .Site.Data.flinks.zh_cn }}
        {{ range $flinks }}
            <h2 class="group-title">{{ .FLinksTitle }}</h2>
            {{ if .FLinksDesc }}<p class="group-desc">{{ .FLinksDesc }}</p>{{ end }}
            
            <div class="link-grid">
                {{ range .FLinksList }}
                <a href="{{ .link }}" target="_blank" class="link-card">
                    <div class="link-card-inner">
                        <div class="link-avatar-wrap">
                            <img src="{{ .avatar | default "/images/avatar.jpg" }}" alt="{{ .name }}" onerror="this.src='/images/avatar.jpg'" />
                        </div>
                        <div class="link-info">
                            <span class="link-name">{{ .name }}</span>
                            <span class="link-desc" title="{{ .desc }}">{{ .desc }}</span>
                        </div>
                    </div>
                </a>
                {{ end }}
            </div>
            <div class="clear"></div>
        {{ end }}
        
        <div class="divider-line">~~~~~ 我可是有底线的哟 ~~~~~</div>
    </div>
</div>
{{ end }}
