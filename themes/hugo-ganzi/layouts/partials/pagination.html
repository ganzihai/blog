{{ $paginator := .Paginator }}
{{ if gt $paginator.TotalPages 1 }}
<div class="pagination">
    {{ if $paginator.HasPrev }}
    <a class="prev page-numbers" href="{{ $paginator.Prev.URL }}">&laquo; 上一页</a>
    {{ end }}

    {{ range $paginator.Pagers }}
    {{ if eq . $paginator }}
    <span aria-current="page" class="page-numbers current">{{ .PageNumber }}</span>
    {{ else }}
    <a class="page-numbers" href="{{ .URL }}">{{ .PageNumber }}</a>
    {{ end }}
    {{ end }}

    {{ if $paginator.HasNext }}
    <a class="next page-numbers" href="{{ $paginator.Next.URL }}">下一页 &raquo;</a>
    {{ end }}
</div>
{{ end }}
