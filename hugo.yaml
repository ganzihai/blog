# hugo.yaml
baseURL: "https://blog.ganzi.fun"  # ✅ 替换为你的真实域名
languageCode: "zh-cn"
title: "杆子博客"

# 生产环境专属配置
params:
  # 启用 CDN（避免本地资源 404）
  vendors:
    enable: true
    cdn: jsdelivr
  
  # 禁用开发功能
  debug: false
  # 启用 SEO 优化
  seo:
    enable: true
  
  # 评论系统（示例：Giscus）
  comments:
    enable: true
    provider: giscus
    giscus:
      repo: "yourname/your-repo"
      repoId: "R_xxx"  # 从 https://giscus.app 获取
      category: "Announcements"
      categoryId: "DIC_xxx"

# 构建优化
build:
  writeStats: true
  cacheBusters:
    - source: ".*"
      target: "$1"

# 输出优化
minify:
  disableXML: true
  minifyOutput: true